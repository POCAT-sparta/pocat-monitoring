global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: "pocat-backend"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["10.0.148.44:8081"]
  - job_name: "pocat-batch"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["10.0.139.89:8081"]
  - job_name: "kafka-node"
    static_configs:
      - targets: ["10.0.142.1:9100"]
  - job_name: "redis-node"
    static_configs:
      - targets: ["10.0.141.237:9100"]
  - job_name: "es-node"
    static_configs:
      - targets: ["10.0.143.58:9100"]
  - job_name: "batch-node"
    static_configs:
      - targets: ["10.0.139.89:9100"]
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["localhost:9308"]
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["localhost:9121"]
  - job_name: "mysql-exporter"
    static_configs:
      - targets: ["localhost:9104"]