global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "pocat-backend"
    metrics_path: /actuator/prometheus
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8081
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: app
        action: keep

  - job_name: "pocat-batch"
    metrics_path: /actuator/prometheus
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8081
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: batch
        action: keep

  - job_name: "app-node"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: app
        action: keep

  - job_name: "batch-node"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: batch
        action: keep

  - job_name: "kafka-node"
    static_configs:
      - targets: ["10.0.132.228:9100"]

  - job_name: "redis-node"
    static_configs:
      - targets: ["10.0.139.96:9100"]

  - job_name: "es-node"
    static_configs:
      - targets: ["10.0.137.237:9100"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["pocat-kafka-exporter:9308"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["pocat-redis-exporter:9121"]

  - job_name: "mysql-exporter"
    static_configs:
      - targets: ["pocat-mysql-exporter:9104"]

  - job_name: "elasticsearch-exporter"
    static_configs:
      - targets: ["pocat-elasticsearch-exporter:9114"]