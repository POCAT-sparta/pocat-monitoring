global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]  # 모니터링 서버 자기 자신

  - job_name: "pocat-backend"
    metrics_path: /actuator/prometheus
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8080
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: app
        action: keep

  - job_name: "pocat-batch"
    metrics_path: /actuator/prometheus
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8081
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: batch
        action: keep

  - job_name: "app-node"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: app
        action: keep

  - job_name: "batch-node"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
    relabel_configs:
      - source_labels: [__meta_ec2_tag_role]
        regex: batch
        action: keep

  - job_name: "kafka-node"
    static_configs:
      - targets: ["10.0.132.228:9100"]  # Kafka EC2 node-exporter

  - job_name: "redis-node"
    static_configs:
      - targets: ["10.0.139.96:9100"]  # Redis EC2 node-exporter

  - job_name: "es-node"
    static_configs:
      - targets: ["10.0.137.237:9100"]  # ES EC2 node-exporter

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["localhost:9308"]  # 모니터링 서버의 kafka-exporter

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["localhost:9121"]  # 모니터링 서버의 redis-exporter

  - job_name: "mysql-exporter"
    static_configs:
      - targets: ["localhost:9104"]  # 모니터링 서버의 mysql-exporter

  - job_name: "elasticsearch-exporter"
    static_configs:
      - targets: ["localhost:9114"]  # 모니터링 서버의 elasticsearch-exporter