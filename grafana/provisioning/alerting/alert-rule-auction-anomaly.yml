apiVersion: 1
# admin-alert 채널로 보냄
groups:
  - orgId: 1
    name: POCAT-Auction-Alerts
    folder: POCAT
    interval: 1m
    rules:
      - uid: pocat-backend-auction-anomaly
        title: "경매 이상 감지 [AUCTION_ANOMALY]"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(count_over_time({service="backend", level="WARN"} |= "[AUCTION_ANOMALY]" [5m]))'
              instant: true
              queryType: instant
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "경매 이상 징후 감지"
          description: "최근 5분간 [AUCTION_ANOMALY] 로그 발생"
        labels:
          severity: warning
          channel: admin
        isPaused: false
