apiVersion: 1

groups:
  - orgId: 1
    name: POCAT-Warn-Alerts
    folder: POCAT
    interval: 1m
    rules:
      - uid: pocat-level-warn
        title: "Backend WARN 로그 감지"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(count_over_time({service="backend", level="WARN"}[5m]))'
              instant: true
              queryType: instant
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Backend WARN 로그 감지"
          description: "최근 5분간 WARN 레벨 로그 발생"
        labels:
          level: warn
        isPaused: false
