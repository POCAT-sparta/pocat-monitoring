apiVersion: 1

groups:
  - orgId: 1
    name: POCAT-Info-Alerts
    folder: POCAT
    interval: 24h
    rules:
      - uid: pocat-level-info
        title: "Backend 주요 작업 완료/이벤트 감지"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: "sum(count_over_time({service=\"backend\", level=\"INFO\"} |~ `\\[CARD_SYNC\\]|\\[ES_MIGRATION\\]|\\[RAG_REINDEX\\]|\\[PAYMENT_ESCALATION\\]` [5m]))"
              instant: true
              queryType: instant
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "Backend 주요 작업 이벤트 감지"
          description: "최근 5분간 주요 배치/결제 INFO 로그 발생"
        labels:
          level: info
        isPaused: false
